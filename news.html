<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4498877948935236" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market News | SafeTrade Insider Intelligence</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --accent: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* Navigation Menu */
        nav { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        nav a:hover, nav a.active { color: var(--accent); font-weight: bold; }

        .header h1 { font-size: 24px; color: var(--accent); margin: 0; }
        .header p { color: var(--text-dim); font-size: 13px; margin-top: 5px; }

        /* News Feed Styling */
        #news-feed { margin-top: 30px; }
        .news-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .news-item:hover { border-color: var(--accent); transform: translateY(-2px); }
        .news-title { font-size: 18px; color: var(--text-main); text-decoration: none; font-weight: bold; display: block; margin-bottom: 8px; }
        .news-meta { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .news-snippet { font-size: 14px; color: var(--text-dim); margin-top: 10px; line-height: 1.5; }

        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <a href="index.html">Terminal</a>
        <a href="news.html" class="active">Market News</a>
        <a href="intelligence-log.html">Intelligence Log</a>
    </nav>

    <div class="header">
        <h1>GLOBAL MARKET PULSE</h1>
        <p>Real-time institutional news aggregation for Crypto and Macro trends.</p>
    </div>

    <div id="news-feed">
        <p style="color: var(--text-dim);">Scanning news wires...</p>
    </div>

    <footer>
        &copy; 2026 SafeTrade Insider | Data sourced via RSS Financial Feeds
    </footer>
</div>

<script>
    async function fetchNews() {
        const feedUrl = 'https://www.coindesk.com/arc/outboundfeeds/rss/'; // You can change this to any RSS link
        const proxyUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feedUrl);

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const container = document.getElementById('news-feed');
            container.innerHTML = '';

            data.items.forEach(item => {
                const newsItem = `
                    <div class="news-item">
                        <div class="news-meta">${new Date(item.pubDate).toLocaleDateString()} | Global Wire</div>
                        <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                        <div class="news-snippet">${item.description.substring(0, 150)}...</div>
                    </div>
                `;
                container.innerHTML += newsItem;
            });
        } catch (error) {
            document.getElementById('news-feed').innerHTML = '<p style="color:red;">Error connecting to news wire. Please try again.</p>';
        }
    }

    fetchNews();
</script>

</body>
</html>
