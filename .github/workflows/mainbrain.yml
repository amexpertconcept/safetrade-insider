name: SafeTrade Terminal Maintainer

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-terminal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Intelligence Data
        run: |
          # Get BTC Price
          BTC=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd" | jq -r '.bitcoin.usd')
          
          # Get Investor Sentiment (Fear & Greed Index)
          SENTIMENT=$(curl -s "https://api.alternative.me/fng/" | jq -r '.data[0].value')
          
          # Save to Environment
          echo "BTC_PRICE=$BTC" >> $GITHUB_ENV
          echo "SENTIMENT_VAL=$SENTIMENT" >> $GITHUB_ENV

      - name: Update Signals File
        run: |
          echo '{
            "btc_price": "$${{ env.BTC_PRICE }}",
            "dxy_value": "103.85",
            "ai_signal_name": "STABLE",
            "market_outlook": "NEUTRAL",
            "ai_primary_driver": "BTC holding structure at $${{ env.BTC_PRICE }}. DXY stability limiting volatility.",
            "ai_safetrade_action": "Maintain core positions. Monitor $68k resistance level.",
            "investor_sentiment": "${{ env.SENTIMENT_VAL }}",
            "live_performance": "+1.2% (24h)",
            "quick_pulse": [
              "Institutional inflows into BTC ETFs remain steady.",
              "DXY consolidates as market awaits Fed commentary.",
              "On-chain data suggests accumulation phase is active."
            ]
          }' > signals.json

      - name: Commit and Push
        run: |
          git config --global user.name "SafeTrade-Bot"
          git config --global user.email "bot@safetrade.com"
          git add signals.json
          git commit -m "Full Terminal Refresh: BTC at $${{ env.BTC_PRICE }}" || echo "No changes"
          git push
